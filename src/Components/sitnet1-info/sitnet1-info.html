<div style="padding: 20px;">
  <app-subject-header
    title="Networking"
    description="Learn how devices communicate and how networks are structured."
    (backClicked)="goBack()">
  </app-subject-header>

  <h4>Related Articles</h4>

  <div *ngFor="let article of articles$" class="card mb-3" style="max-width: 40rem;">
    <div class="card-body">
      <h5 class="card-title">{{ article.label }}</h5>
      <div *ngIf="article.data$ | async as data; else loading">
        <p class="card-text">{{ data.extract }}</p>
        <a [href]="data.content_urls?.desktop?.page" target="_blank">Read full article →</a>
      </div>
      <ng-template #loading>
        <ng-container *ngIf="(article.data$ | async) === null; else spinner">
          <p class="text-danger">Failed to load article.</p>
        </ng-container>
        <ng-template #spinner>
          <p>Loading...</p>
        </ng-template>
      </ng-template>
    </div>
  </div>
</div>
