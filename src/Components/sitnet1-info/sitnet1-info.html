<div style="padding: 20px;">
  <app-subject-header
    title="Networking"
    description="Learn how devices communicate and how networks are structured."
    (backClicked)="goBack()">
  </app-subject-header>

  <h4>Related Articles</h4>

  <div *ngFor="let article of articles$" class="card mb-3" style="max-width: 40rem;">
    <div class="card-body">
      <h5 class="card-title">{{ article.label }}</h5>
      <ng-container *ngIf="article.data$ | async as state">
        <p *ngIf="state.status === 'loading'">Loading...</p>
        <p *ngIf="state.status === 'error'" class="text-danger">Failed to load article.</p>
        <ng-container *ngIf="state.status === 'success'">
          <p class="card-text">{{ state.data.extract }}</p>
          <a [href]="state.data.content_urls?.desktop?.page" target="_blank">Read full article →</a>
        </ng-container>
      </ng-container>
    </div>
  </div>
</div>
