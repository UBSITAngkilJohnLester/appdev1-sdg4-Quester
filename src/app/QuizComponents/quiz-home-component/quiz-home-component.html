<h1 class="center top fw-bold">Welcome To Quester!</h1>
<h2 class="center fw-bold">Would you like to take a quiz?</h2>

<div class="row text-center options">
    <div class="col bg-p">
        <h3>Progit</h3>
        <button type="button" class="btn btn-primary btn-lg easy" routerLink="/ProgitE">Easy</button>
        <button type="button" class="btn btn-primary btn-lg medium" [disabled]="!progress.progitEasyDone" routerLink="/ProgitM">Medium</button>
        <button type="button" class="btn btn-primary btn-lg hard" [disabled]="!progress.progitMediumDone" routerLink="/ProgitH">Hard</button>
    </div>

    <div class="col bg-s">
        <h3>Sitnet</h3>
        <button type="button" class="btn btn-primary btn-lg easy" routerLink="/SitnetE">Easy</button>
        <button type="button" class="btn btn-primary btn-lg medium" [disabled]="!progress.sitnetEasyDone" routerLink="/SitnetM">Medium</button>
        <button type="button" class="btn btn-primary btn-lg hard" [disabled]="!progress.sitnetMediumDone" routerLink="/SitnetH">Hard</button>
    </div>

    <div class="col bg-o">
        <h3>Opsyst</h3>
        <button type="button" class="btn btn-primary btn-lg easy" routerLink="/OpsystE">Easy</button>
        <button type="button" class="btn btn-primary btn-lg medium" [disabled]="!progress.opsystEasyDone" routerLink="/OpsystM">Medium</button>
        <button type="button" class="btn btn-primary btn-lg hard" [disabled]="!progress.opsystMediumDone" routerLink="/OpsystH">Hard</button>
    </div>
</div>
