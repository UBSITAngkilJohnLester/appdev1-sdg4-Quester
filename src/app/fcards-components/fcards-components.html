<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcard Stack</title>

<style>
  body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .deck {
    position: relative;
    width: 400px;
    height: 250px;
    margin-top: 40px;
    margin-bottom: 40px; 
  }

  .card {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    border: 2px solid #333;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 18px;
    padding: 20px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    transition: transform 0.4s;
    pointer-events: none; /* 🔥 KEY FIX */
  }

  .card:first-child {
    pointer-events: auto; /* only top card is interactive */
  }

  .controls {
    position: relative;
    z-index: 100; /* ensure above everything */
  }

  button {
    margin: 5px;
    padding: 12px 18px;
    cursor: pointer;
    font-size: 16px;
  }

  .hidden {
    display: none;
  }

  .progress {
    width: 400px;
    margin-top: 15px;
    border: 1px solid #ccc;
  }

  #progressBar {
    height: 20px;
    width: 0%;
    background: green;
  }
</style>
</head>

<body>

<div class="deck" id="deck">
  <div class="card">Card 1: What is HOPSYST1 about?</div>
  <div class="card">Card 2: What is PROGIT1 about?</div>
  <div class="card">Card 3: What is SITNET1 about?</div>
</div>

<div class="controls">
  <button onclick="nextCard()">Next</button>
  <button onclick="startOver()">Start Over</button>
  <button onclick="endCards()">End</button>
</div>

<div class="progress">
  <div id="progressBar"></div>
</div>

<script>
  const deck = document.getElementById("deck");
  let cards = Array.from(deck.children);
  let index = 0;

  function updateStack() {
    cards.forEach((card, i) => {
      card.style.zIndex = cards.length - i;
      card.style.transform = `translateY(${i * 15}px)`;

      // 🔥 ensure only top card is clickable
      card.style.pointerEvents = (i === 0) ? "auto" : "none";
    });
  }

  function nextCard() {
    const first = cards.shift();
    cards.push(first);
    deck.appendChild(first);

    index = (index + 1) % cards.length;
    updateProgress();
    updateStack();
  }

  function startOver() {
    cards = Array.from(deck.children);
    index = 0;
    updateProgress();
    updateStack();
  }

  function endCards() {
    deck.classList.add("hidden");
    document.querySelector(".controls").classList.add("hidden");
  }

  function updateProgress() {
    const percent = ((index + 1) / cards.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
  }

  updateStack();
</script>

</body>
</html>
