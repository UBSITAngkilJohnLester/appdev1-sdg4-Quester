<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Flashcards</title>

<style>
body {
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* hide radios */
input {
  display: none;
}

.deck {
  position: relative;
  width: 400px;
  height: 250px;
  margin: 40px 0;
  perspective: 1000px;
}

/* card base */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
  transition: transform 0.5s;
}

/* stacking positions */
#step1:checked ~ .deck .c1 { transform: translateY(0); z-index: 3; }
#step1:checked ~ .deck .c2 { transform: translateY(15px); z-index: 2; }
#step1:checked ~ .deck .c3 { transform: translateY(30px); z-index: 1; }

#step2:checked ~ .deck .c2 { transform: translateY(0); z-index: 3; }
#step2:checked ~ .deck .c3 { transform: translateY(15px); z-index: 2; }
#step2:checked ~ .deck .c1 { transform: translateY(30px); z-index: 1; }

#step3:checked ~ .deck .c3 { transform: translateY(0); z-index: 3; }
#step3:checked ~ .deck .c1 { transform: translateY(15px); z-index: 2; }
#step3:checked ~ .deck .c2 { transform: translateY(30px); z-index: 1; }

/* flip container */
.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

/* flip trigger */
.flip-toggle:checked + .card .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  border: 2px solid #333;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
  background: #f0f0f0;
}

/* controls */
.controls label {
  margin: 5px;
  padding: 10px 15px;
  background: #ddd;
  cursor: pointer;
  display: inline-block;
}
</style>
</head>

<body>

<!-- STEP CONTROL -->
<input type="radio" name="step" id="step1" checked>
<input type="radio" name="step" id="step2">
<input type="radio" name="step" id="step3">

<div class="deck">

  <!-- CARD 1 -->
  <input type="checkbox" id="flip1" class="flip-toggle">
  <label for="flip1" class="card c1">
    <div class="inner">
      <div class="front">HOPSYST1?</div>
      <div class="back">Operating Systems</div>
    </div>
  </label>

  <!-- CARD 2 -->
  <input type="checkbox" id="flip2" class="flip-toggle">
  <label for="flip2" class="card c2">
    <div class="inner">
      <div class="front">PROGIT1?</div>
      <div class="back">Programming + Git</div>
    </div>
  </label>

  <!-- CARD 3 -->
  <input type="checkbox" id="flip3" class="flip-toggle">
  <label for="flip3" class="card c3">
    <div class="inner">
      <div class="front">SITNET1?</div>
      <div class="back">Networking</div>
    </div>
  </label>

</div>

<!-- CONTROLS -->
<div class="controls">
  <label for="step1">1</label>
  <label for="step2">2</label>
  <label for="step3">3</label>
</div>

</body>
</html>
