<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards No JS</title>

<style>
body {
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* hide inputs */
input {
  display: none;
}

/* END */
#end:checked ~ .app {
  display: none;
}

/* DECK (bigger) */
.deck {
  position: relative;
  width: 600px;
  height: 350px;
  margin: 40px 0;
  perspective: 1000px;
}

/* CARD */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* STACKING */
#s1:checked ~ .app .c1 { transform: translateY(0); z-index: 3; }
#s1:checked ~ .app .c2 { transform: translateY(20px); z-index: 2; }
#s1:checked ~ .app .c3 { transform: translateY(40px); z-index: 1; }

#s2:checked ~ .app .c2 { transform: translateY(0); z-index: 3; }
#s2:checked ~ .app .c3 { transform: translateY(20px); z-index: 2; }
#s2:checked ~ .app .c1 { transform: translateY(40px); z-index: 1; }

#s3:checked ~ .app .c3 { transform: translateY(0); z-index: 3; }
#s3:checked ~ .app .c1 { transform: translateY(20px); z-index: 2; }
#s3:checked ~ .app .c2 { transform: translateY(40px); z-index: 1; }

/* INNER FLIP */
.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

/* FLIP when active */
#s1:checked ~ .app .c1 .inner,
#s2:checked ~ .app .c2 .inner,
#s3:checked ~ .app .c3 .inner {
  transform: rotateY(180deg);
}

/* CARD SIDES */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 2px solid #333;
  border-radius: 12px;
  padding: 20px;

  display: block;
  text-align: left;
  overflow-y: auto;
  word-break: break-word;

  backface-visibility: hidden;
  background: white;

  font-size: 18px;
  line-height: 1.4;
}

/* EDITABLE FEEL */
.front:focus, .back:focus {
  outline: 2px solid #4CAF50;
}

/* BACK */
.back {
  transform: rotateY(180deg);
  background: #f0f0f0;
}

/* BUTTONS */
.controls {
  margin-top: 10px;
}

.controls label {
  margin: 5px;
  padding: 12px 18px;
  background: #ddd;
  cursor: pointer;
  display: inline-block;
  border-radius: 6px;
}

/* STATE-BASED BUTTONS */
.state {
  display: none;
}

#s1:checked ~ .app .s1 { display: block; }
#s2:checked ~ .app .s2 { display: block; }
#s3:checked ~ .app .s3 { display: block; }

</style>
</head>

<body>

<!-- STATES -->
<input type="radio" name="step" id="s1" checked>
<input type="radio" name="step" id="s2">
<input type="radio" name="step" id="s3">

<!-- END -->
<input type="checkbox" id="end">

<div class="app">

  <div class="deck">

    <!-- CARD 1 -->
    <div class="card c1">
      <div class="inner">
        <div class="front" contenteditable="true">
          Edit question 1
        </div>
        <div class="back" contenteditable="true">
          Edit answer 1
        </div>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card c2">
      <div class="inner">
        <div class="front" contenteditable="true">
          Edit question 2
        </div>
        <div class="back" contenteditable="true">
          Edit answer 2
        </div>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="card c3">
      <div class="inner">
        <div class="front" contenteditable="true">
          Edit question 3
        </div>
        <div class="back" contenteditable="true">
          Edit answer 3
        </div>
      </div>
    </div>

  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <!-- STATE 1 -->
    <div class="state s1">
      <label for="s3">Previous</label>
      <label for="s2">Next</label>
      <label for="end">End</label>
    </div>

    <!-- STATE 2 -->
    <div class="state s2">
      <label for="s1">Previous</label>
      <label for="s3">Next</label>
      <label for="end">End</label>
    </div>

    <!-- STATE 3 -->
    <div class="state s3">
      <label for="s2">Previous</label>
      <label for="s1">Next</label>
      <label for="end">End</label>
    </div>

  </div>

</div>

</body>
</html>
