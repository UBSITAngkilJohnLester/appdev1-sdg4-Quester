<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashcards No JS</title>

<style>
body {
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* hide inputs */
input {
  display: none;
}

/* END toggle */
#end:checked ~ .app {
  display: none;
}

/* deck */
.deck {
  position: relative;
  width: 400px;
  height: 250px;
  margin: 40px 0;
  perspective: 1000px;
}

/* card */
.card {
  position: absolute;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

/* STACK STATES */

/* step1 */
#s1:checked ~ .app .c1 { transform: translateY(0); z-index: 3; pointer-events:auto;}
#s1:checked ~ .app .c2 { transform: translateY(15px); z-index: 2; }
#s1:checked ~ .app .c3 { transform: translateY(30px); z-index: 1; }

/* step2 */
#s2:checked ~ .app .c2 { transform: translateY(0); z-index: 3; pointer-events:auto;}
#s2:checked ~ .app .c3 { transform: translateY(15px); z-index: 2; }
#s2:checked ~ .app .c1 { transform: translateY(30px); z-index: 1; }

/* step3 */
#s3:checked ~ .app .c3 { transform: translateY(0); z-index: 3; pointer-events:auto;}
#s3:checked ~ .app .c1 { transform: translateY(15px); z-index: 2; }
#s3:checked ~ .app .c2 { transform: translateY(30px); z-index: 1; }

/* flip */
.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.flip:checked + .card .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 2px solid #333;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backface-visibility: hidden;
  background: white;
}

/* editable */
.front, .back {
  outline: none;
}

.front[contenteditable],
.back[contenteditable] {
  cursor: text;
}

.back {
  transform: rotateY(180deg);
  background: #f0f0f0;
}

/* buttons */
.controls label {
  margin: 5px;
  padding: 10px 15px;
  background: #ddd;
  cursor: pointer;
  display: inline-block;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- STEP STATE -->
<input type="radio" name="step" id="s1" checked>
<input type="radio" name="step" id="s2">
<input type="radio" name="step" id="s3">

<!-- END -->
<input type="checkbox" id="end">

<div class="app">

  <div class="deck">

    <!-- CARD 1 -->
    <input type="checkbox" id="f1" class="flip">
    <label for="f1" class="card c1">
      <div class="inner">
        <div class="front" contenteditable="true">Edit question 1</div>
        <div class="back" contenteditable="true">Edit answer 1</div>
      </div>
    </label>

    <!-- CARD 2 -->
    <input type="checkbox" id="f2" class="flip">
    <label for="f2" class="card c2">
      <div class="inner">
        <div class="front" contenteditable="true">Edit question 2</div>
        <div class="back" contenteditable="true">Edit answer 2</div>
      </div>
    </label>

    <!-- CARD 3 -->
    <input type="checkbox" id="f3" class="flip">
    <label for="f3" class="card c3">
      <div class="inner">
        <div class="front" contenteditable="true">Edit question 3</div>
        <div class="back" contenteditable="true">Edit answer 3</div>
      </div>
    </label>

  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <!-- PREVIOUS -->
    <label for="s1">Prev</label>
    <label for="s2">Next</label>
    <label for="end">End</label>
  </div>

</div>

</body>
</html>
